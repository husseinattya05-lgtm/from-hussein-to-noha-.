<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Memories </title>

<style>

body {
  margin: 0;
  background: black;
  overflow: hidden;
}

/*   */
video {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: -1;
}

/*   */
#imageLayer {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 2;
}

#image {
  width: 280px;
  border-radius: 12px;
  opacity: 0;
  transition: opacity 0.5s;
}

/*  */
#monthText {
  position: fixed;
  top: 40px;
  width: 100%;
  text-align: center;
  color: white;
  font-size: 22px;
  z-index: 2;
}

/*   */
button {
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  padding:15px 25px;
  font-size:18px;
  z-index:999;
}

</style>
</head>

<body>

<button id="startBtn">Start</button>

<!--  -->
<video id="video" autoplay muted loop>
  <source src="video.mp4" type="video/mp4">
</video>

<!--  -->
<div id="imageLayer">
  <img id="image" src="">
</div>

<div id="monthText"></div>

<!--  -->
<audio id="music" src="music.mp3"></audio>
<audio id="notif" src="notif.mp3"></audio>

<script>

const video = document.getElementById("video");
const image = document.getElementById("image");
const music = document.getElementById("music");
const notif = document.getElementById("notif");
const monthText = document.getElementById("monthText");
const startBtn = document.getElementById("startBtn");

let images = [
  "1-4.jpg",
  "2-4.jpg",
  "1-5.jpg",
  "2-5.jpg",
  "1-6.jpg",
  "2-6.jpg"
];

let index = 0;

const monthNames = {
  4:"April 2025",
  5:"May 2025",
  6:"June 2025",
  7:"July 2025",
  8:"August 2025",
  9:"September 2025",
  10:"October 2025",
  11:"November 2025",
  12:"December 2025",
  1:"January 2025",
  2:"February 2025",
  3:"March 2025"
};

function showImage(){

  if(index >= images.length) return;

  const path = images[index];

  image.src = path;
  image.style.opacity = 1;

  const file = path.split(".")[0];
  const monthNum = file.split("-")[1];

  monthText.innerText = monthNames[monthNum];

  //   notification
  notif.currentTime = 0;
  notif.play();

  index++;
}

function start(){

  video.play();
  music.play();

  //   
  showImage();

  setInterval(()=>{
    if(video.currentTime / video.duration < 0.95){
      showImage();
    }
  },150);

}

startBtn.addEventListener("click", () => {
  startBtn.style.display = "none";
  start();
});

</script>

</body>
</html>
